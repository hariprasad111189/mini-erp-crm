services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mini_erp
      POSTGRES_PASSWORD: mini_erp_password
      POSTGRES_DB: mini_erp_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mini_erp -d mini_erp_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

